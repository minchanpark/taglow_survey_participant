services:
  participant:
    container_name: ${CONTAINER_NAME:-frontend-participant}
    image: ${IMAGE_REPOSITORY:-frontend-participant}:${IMAGE_TAG:-latest}
    pull_policy: never
    restart: unless-stopped
    init: true
    labels:
      com.taglow.service: ${CONTAINER_NAME:-frontend-participant}
      com.taglow.stack: taglow
    ports:
      - "127.0.0.1:${HOST_PORT:-3000}:${CONTAINER_PORT:-3000}"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:${CONTAINER_PORT:-3000}/healthz || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_signal: SIGQUIT
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
